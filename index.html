<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌸 CPBL 啦啦隊女孩 沉浸式抽卡卡冊 (大滿貫破關版)</title>
    <style>
        :root {
            --bg-color: #2b1b24;
            --panel-bg: #3d2635;
            --text-main: #ffe6f2;
            --gold: #ffd700;
            --pink: #ff7eb3;
            --silver: #bdc3c7;
            
            --team-ps: #f39c12; --team-db: #e74c3c; --team-ug: #e67e22; 
            --team-rg: #c0392b; --team-fa: #3498db; --team-ws: #2ecc71; 
        }
        body {
            font-family: "Microsoft JhengHei", sans-serif; background-color: var(--bg-color);
            color: var(--text-main); margin: 0; padding: 20px; text-align: center;
        }
        h1 { color: var(--pink); text-shadow: 0 0 10px rgba(255, 126, 179, 0.5); margin-bottom: 5px; }
        
        /* 抽卡券 UI */
        .stamina-bar {
            background: rgba(0,0,0,0.5); display: inline-block; padding: 8px 20px;
            border-radius: 20px; border: 2px solid var(--pink); font-size: 16px;
            font-weight: bold; color: white; margin-bottom: 20px; box-shadow: 0 0 10px rgba(255,126,179,0.3);
        }
        .stamina-count { color: var(--gold); font-size: 20px; margin: 0 5px; }
        .stamina-timer { color: #aaa; font-size: 14px; margin-left: 10px; font-weight: normal;}

        .controls { margin-bottom: 15px; display: flex; justify-content: center; flex-wrap: wrap; gap: 10px;}
        .team-gacha-section { background: rgba(255,126,179,0.1); padding: 15px; border-radius: 12px; margin: 0 auto 20px auto; max-width: 600px; border: 1px solid rgba(255,126,179,0.3);}
        
        button {
            background: linear-gradient(45deg, #ff9a9e, #fecfef); border: none; padding: 10px 18px; font-size: 15px; font-weight: bold;
            color: #551a35; border-radius: 8px; cursor: pointer; transition: transform 0.1s, box-shadow 0.2s; box-shadow: 0 4px 15px rgba(255, 154, 158, 0.3);
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(255, 154, 158, 0.5); }
        button:disabled { background: #555; color: #888; cursor: not-allowed; box-shadow: none; transform: none;}
        
        button.btn-box { background: linear-gradient(45deg, #a18cd1, #fbc2eb); }
        button.btn-team { background: linear-gradient(45deg, #f39c12, #e67e22); color: white;}
        button.btn-rates { background: linear-gradient(45deg, #4facfe, #00f2fe); color: white; }
        button.btn-log { background: linear-gradient(45deg, #f1c40f, #e67e22); color: white; }
        button.btn-collection { background: linear-gradient(45deg, #84fab0, #8fd3f4); color: #222; }
        button.btn-next { background: linear-gradient(45deg, #84fab0, #8fd3f4); color: #222; font-size: 20px; padding: 15px 40px; display: none; margin: 20px auto;}
        
        select.team-picker { background: #553549; color: white; border: 1px solid var(--pink); padding: 8px 15px; border-radius: 6px; font-size: 15px; font-weight: bold; margin-right: 10px;}

        #display-area { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 400px; margin-top: 10px; }
        #queue-status { font-size: 14px; color: #ffb3d9; margin-bottom: 10px; }
        
        /* 卡片設計 */
        .card { width: 240px; height: 350px; background-color: var(--panel-bg); border-radius: 15px; display: flex; flex-direction: column; justify-content: flex-start; align-items: center; padding: 12px; box-sizing: border-box; position: relative; overflow: hidden; border: 4px solid #553549; box-shadow: 0 10px 25px rgba(0,0,0,0.6); animation: flipIn 0.5s ease-out forwards; }
        .card-team { font-size: 13px; font-weight: bold; margin-bottom: 8px; z-index: 2; padding: 4px 12px; border-radius: 20px; color: white; width: 80%; text-align: center;}
        .card-type { font-size: 11px; margin-bottom: 5px; z-index: 2; font-weight: bold; letter-spacing: 2px; color: #fbc2eb; }
        .card-name { font-size: 26px; font-weight: bold; z-index: 2; letter-spacing: 2px; text-shadow: 1px 1px 3px rgba(0,0,0,0.8); }
        .card-image-wrapper { width: 100%; height: 160px; border-radius: 10px; overflow: hidden; position: relative; margin-bottom: 10px; border: 2px solid rgba(255,255,255,0.2); background-color: #2b1b24; z-index: 2; }
        .card-image-wrapper img { width: 100%; height: 100%; object-fit: cover; object-position: center 15%; display: block; }
        .missing-img { width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; color: #ffb3d9; font-size: 12px; background: linear-gradient(135deg, #4a2f41, #2b1b24); text-align: center;}

        /* 稀有度特效 */
        .rarity-common { border-color: #886a7d; background: linear-gradient(135deg, #4a2f41, #2b1b24); }
        .rarity-rare { border-color: var(--silver); background: linear-gradient(135deg, #2c3e50, #1a252f); }
        .rarity-rare::after { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(125deg, transparent 30%, rgba(255,255,255,0.4) 45%, rgba(255,255,255,0.7) 50%, transparent 55%); background-size: 200% 200%; animation: sweep 2.5s infinite linear; pointer-events: none; z-index: 5; mix-blend-mode: overlay; }
        .rarity-epic { border-color: #00f2fe; background: linear-gradient(135deg, #2a0845, #6441A5); }
        .rarity-epic::after { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(125deg, transparent 20%, rgba(0,242,254,0.4) 40%, rgba(79,172,254,0.6) 50%, transparent 60%); background-size: 200% 200%; animation: holo 2s infinite linear; pointer-events: none; z-index: 5; mix-blend-mode: color-dodge; }
        .rarity-relic { border-color: #e67e22; background: linear-gradient(135deg, #5c2c16, #2d1307); }
        .relic-patch { position: absolute; bottom: 8px; left: 8px; width: 40px; height: 40px; border: 2px solid #e67e22; border-radius: 5px; z-index: 10; background: repeating-linear-gradient(45deg, #ddd, #ddd 3px, #bbb 3px, #bbb 6px); box-shadow: 2px 2px 4px rgba(0,0,0,0.8) inset; display: flex; justify-content: center; align-items: center; font-size: 9px; color: #333; font-weight: bold; }
        .rarity-legendary { border-color: var(--pink); background: linear-gradient(135deg, #511029, #2b0816); box-shadow: 0 0 20px rgba(255, 126, 179, 0.5); }
        .rarity-legendary::after { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(125deg, transparent 20%, rgba(255,255,255,0.5) 40%, rgba(255,126,179,0.6) 50%, transparent 60%); background-size: 200% 200%; animation: holo 2.5s infinite linear; pointer-events: none; z-index: 5; mix-blend-mode: overlay; }
        .rarity-mythic { border-color: #fff; background: linear-gradient(135deg, #111, #333); box-shadow: 0 0 30px rgba(255,255,255,0.6); }
        .rarity-mythic::after { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(125deg, rgba(255,0,0,0.2) 10%, rgba(255,165,0,0.2) 40%, rgba(0,128,0,0.2) 70%, rgba(0,0,255,0.2) 100%); background-size: 200% 200%; animation: sweep 3s infinite linear; pointer-events: none; z-index: 5; mix-blend-mode: color-dodge; }
        .mythic-badge { position: absolute; top: 8px; right: 8px; background: var(--gold); color: black; font-size: 10px; font-weight: bold; padding: 2px 6px; border-radius: 4px; z-index: 10; }
        .card.locked { filter: grayscale(100%) brightness(0.4) !important; border: 4px dashed #555 !important; box-shadow: none !important; background: #111 !important; }
        .card.locked::after { display: none !important; }
        .lock-overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.75); color: #ff4d4d; padding: 6px 12px; border-radius: 6px; font-weight: bold; font-size: 14px; z-index: 15; pointer-events: none; border: 1px solid #ff4d4d; }
        .signature-overlay { position: absolute; bottom: 5px; right: 8px; z-index: 10; font-family: "Brush Script MT", "Comic Sans MS", cursive; font-size: 22px; color: var(--gold); transform: rotate(-10deg); text-shadow: 2px 2px 4px rgba(0,0,0,0.8); }
        .lip-mark { font-size: 26px; font-style: normal; text-shadow: none; }

        @keyframes flipIn { 0% { transform: scale(0.8) rotateY(90deg); opacity: 0; } 100% { transform: scale(1) rotateY(0deg); opacity: 1; } }
        @keyframes holo { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        @keyframes sweep { 0% { background-position: 0 0; } 100% { background-position: 200% 200%; } }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.02); } 100% { transform: scale(1); } }

        /* 視窗與圖鑑共用 */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(20,10,15,0.96); z-index: 100; overflow-y: auto; padding: 20px; box-sizing: border-box; }
        .modal-content { background: rgba(255,126,179,0.03); border-radius: 12px; margin: 10px auto; padding: 20px; max-width: 900px; border: 1px solid rgba(255,126,179,0.15); }
        .close-btn { position: sticky; top: 10px; float: right; background: #e74c3c; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; z-index: 105; font-weight: bold;}
        .album-filters { display: flex; justify-content: center; gap: 15px; margin-bottom: 20px; }
        .album-filters select { background: #553549; color: white; border: 1px solid var(--pink); padding: 8px 15px; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer;}
        .album-grid-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; justify-items: center; max-width: 820px; margin: 0 auto; }
        .album-item-wrapper { position: relative; }
        .album-count-badge { position: absolute; top: -10px; right: -10px; background: var(--pink); color: white; font-weight: bold; border-radius: 50%; width: 28px; height: 28px; line-height: 28px; font-size: 14px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.5); z-index: 10; }
        .album-pagination { margin-top: 25px; display: flex; justify-content: center; align-items: center; gap: 20px; }
        .album-page-info { font-size: 18px; font-weight: bold; color: var(--pink); }

        /* 完成蒐集橫幅特效 */
        .complete-banner {
            background: linear-gradient(45deg, #f1c40f, #ff7eb3); color: #fff; padding: 12px;
            border-radius: 8px; margin: 0 auto 15px auto; font-size: 18px; max-width: 820px;
            text-shadow: 1px 1px 3px #000; font-weight: bold; box-shadow: 0 4px 15px rgba(241,196,15,0.4);
            animation: pulse 1.5s infinite; text-align: center;
        }

        .rate-table { width: 100%; border-collapse: collapse; margin-top: 10px; color: #fff;}
        .rate-table th, .rate-table td { border: 1px solid #704762; padding: 10px; text-align: center; }
        .rate-table th { background: #553549; color: var(--pink); }

        .log-item { background:#4a2f41; border:1px solid #704762; border-radius:8px; padding:10px 15px; display:flex; justify-content:space-between; align-items:center; margin-bottom: 10px; transition: transform 0.1s;}
        .log-item:hover { transform: scale(1.02); }
        .log-pull-num { background:#2b1b24; padding:5px 15px; border-radius:20px; color:#fff; font-weight:bold; font-size:14px; border:1px solid #704762; }

        #card-viewer-modal { background: rgba(0,0,0,0.85); justify-content: center; align-items: center; flex-direction: column; cursor: pointer; }
        #card-viewer-content { transform: scale(1.1); margin-bottom: 30px; cursor: default; }
    </style>
</head>
<body>

    <h1>🌸 CPBL 啦啦隊女孩 抽卡模擬器</h1>
    
    <div class="stamina-bar">
        🎫 抽卡券: <span id="ui-tickets" class="stamina-count">10</span>/10
        <span id="ui-timer" class="stamina-timer"></span>
    </div>

    <div class="controls">
        <button id="btn-pack" onclick="startOpening('pack')">🎀 撕開一包 (消耗 1 券)</button>
        <button id="btn-box" class="btn-box" onclick="startOpening('box')">🎁 撕開一盒盲盒 (消耗 10 券)</button>
    </div>
    
    <div class="team-gacha-section">
        <div style="margin-bottom: 10px; color: #ffb3d9; font-weight: bold;">🎯 狙擊專屬球隊 (注意：大獎機率將下調)</div>
        <select id="target-team-select" class="team-picker">
            <option value="Passion Sisters">中信兄弟 Passion Sisters</option>
            <option value="Uni Girls">統一獅 Uni Girls</option>
            <option value="Fubon Angels">富邦悍將 Fubon Angels</option>
            <option value="Dragons Beauties">味全龍 Dragons Beauties</option>
            <option value="Rakuten Girls">樂天桃猿 Rakuten Girls</option>
            <option value="Wing Stars">台鋼雄鷹 Wing Stars</option>
        </select>
        <button id="btn-team-pack" class="btn-team" onclick="startOpening('team')">🎯 抽專屬包 (消耗 1 券)</button>
    </div>

    <div class="controls">
        <button class="btn-rates" onclick="toggleModal('rates-modal')">📊 機率表</button>
        <button class="btn-log" onclick="toggleModal('log-modal')">🏆 大獎紀錄</button>
        <button class="btn-collection" onclick="toggleModal('collection-modal')">📖 九宮格卡冊</button>
        <button onclick="clearCollection()" style="background: #e74c3c; color: white;">🗑️ 重置</button>
    </div>
    
    <div id="display-area">
        <h3 id="status-text" style="color: #ffb3d9;">等待抽卡中... 每分鐘回復 1 張抽卡券！</h3>
        <div id="queue-status"></div>
        <div id="card-container"></div>
        <button id="btn-next" class="btn-next" onclick="showNextCard()">翻開下一張！ ➡️</button>
    </div>

    <div id="rates-modal" class="modal">
        <button class="close-btn" onclick="toggleModal('rates-modal')">✖ 關閉</button>
        <div class="modal-content">
            <h2 style="color: var(--pink);">📊 抽卡機率分布</h2>
            <table class="rate-table">
                <tr><th>卡片款式</th><th>一般池 特殊卡機率</th><th>🎯 專屬球隊池 機率</th></tr>
                <tr><td style="color:#bdc3c7;">💫 亮面特卡 (Rare)</td><td>55.0%</td><td>79.4%</td></tr>
                <tr><td style="color:#00f2fe;">✨ 平行閃卡 (Epic)</td><td>30.0%</td><td>15.0% (機率減半)</td></tr>
                <tr><td style="color:#e67e22;">👕 實戰衣物卡 (Relic)</td><td>10.0%</td><td>4.0%</td></tr>
                <tr><td style="color:var(--pink);">🎀 專屬簽名卡/唇印卡</td><td>4.5%</td><td>1.5%</td></tr>
                <tr><td style="color:var(--gold);">👑 1/1 寶石簽名大獎</td><td>0.5%</td><td>0.1% (極端罕見)</td></tr>
            </table>
        </div>
    </div>

    <div id="log-modal" class="modal">
        <button class="close-btn" onclick="toggleModal('log-modal')">✖ 關閉</button>
        <div class="modal-content" style="max-width: 600px;">
            <h2 style="color: var(--gold); text-align:center;">🏆 高稀有度大獎紀錄</h2>
            <div style="text-align:center; color:#ccc; margin-bottom:15px; font-size:16px;">生涯累計抽卡數：<span id="total-pulls-display" style="color:var(--pink); font-weight:bold; font-size:20px;">0</span> 抽</div>
            <div id="log-list" style="max-height: 60vh; overflow-y:auto; padding-right:5px;"></div>
        </div>
    </div>

    <div id="collection-modal" class="modal">
        <button class="close-btn" onclick="toggleModal('collection-modal')">✖ 關閉卡冊</button>
        <div class="modal-content" style="max-width:950px;">
            <h2 style="color: var(--pink); text-align:center; margin-bottom:10px;">📖 啦啦隊女孩 收藏卡冊</h2>
            <div id="collection-stats" style="text-align:center; margin-bottom:10px; color:#fbc2eb; font-weight:bold;"></div>
            
            <div id="album-complete-banner"></div>

            <div class="album-filters">
                <select id="filter-team" onchange="onAlbumFilterChange()">
                    <option value="Passion Sisters">中信兄弟 Passion Sisters</option>
                    <option value="Uni Girls">統一獅 Uni Girls</option>
                    <option value="Fubon Angels">富邦悍將 Fubon Angels</option>
                    <option value="Dragons Beauties">味全龍 Dragons Beauties</option>
                    <option value="Rakuten Girls">樂天桃猿 Rakuten Girls</option>
                    <option value="Wing Stars">台鋼雄鷹 Wing Stars</option>
                </select>
                <select id="filter-type" onchange="onAlbumFilterChange()">
                    <option value="普卡">🌸 普卡</option>
                    <option value="亮面特卡">💫 亮面特卡</option>
                    <option value="平行閃卡">✨ 平行閃卡</option>
                    <option value="實戰衣物卡">👕 實戰衣物卡</option>
                    <option value="專屬簽名卡">✍ 專屬簽名卡</option>
                    <option value="唇印簽名卡">💋 唇印簽名卡</option>
                    <option value="1/1 寶石簽名卡">👑 1/1 寶石簽名卡</option>
                </select>
            </div>
            <div id="album-grid" class="album-grid-container"></div>
            <div class="album-pagination">
                <button onclick="changeAlbumPage(-1)">◀ 上一頁</button>
                <span id="album-page-info" class="album-page-info">1 / 1</span>
                <button onclick="changeAlbumPage(1)">下一頁 ▶</button>
            </div>
        </div>
    </div>

    <div id="card-viewer-modal" class="modal" style="display:none; align-items:center;" onclick="closeCardViewer()">
        <div id="card-viewer-content" onclick="event.stopPropagation()"></div>
        <button style="background: #444; color: white; border: 2px solid #666; padding: 10px 20px; border-radius: 20px; cursor: pointer; margin-top:10px;" onclick="closeCardViewer()">✖ 關閉檢視</button>
    </div>

    <script>
        const db = {
            "Passion Sisters": { color: "var(--team-ps)", members: ["凱蒂", "貴貴", "希希", "短今", "峮峮", "晴兒", "波波", "畇二", "妮可", "林可", "君白", "曼容", "小迪", "沛婕", "汶汶", "怡琪", "Wendy", "夏蕾", "少鹽", "邊荷律", "牛奶", "芊芊", "衣宸", "瑄", "莎莎", "維尼", "璇璇", "桃子", "金渡兒", "JJUBI", "珮含", "容容"] },
            "Uni Girls": { color: "var(--team-ug)", members: ["妮妮", "Yuki", "Mina", "瑟七", "賴賴", "少少", "芮絲", "曼萍", "Joy", "柔一", "Maggie", "斐棋", "一七", "侯芳", "包子", "千紘", "希美", "趙娟週", "文慧真", "安惠志", "藤本彩花", "子筑", "安琪", "妍蓁", "培根", "姿琳"] },
            "Fubon Angels": { color: "var(--team-fa)", members: ["潔米", "慈妹", "檸檬", "Jessy", "丹丹", "秀秀子", "Tiffany", "安娜", "沁沁", "維心", "奶昔", "大頭", "卡洛琳", "栗子", "南珉貞", "李雅英", "李珠珢", "禾羽", "潔潔", "雅惟", "李晧禎", "貝兒", "小芊", "呱呱", "Laynee", "陳愉", "朴星垠"] },
            "Dragons Beauties": { color: "var(--team-db)", members: ["心璇", "馬妹", "小映", "口水", "Like", "張晴", "芮妮", "霖霖", "小蛙", "蘿拉", "寧寧", "詩雅", "璦昀", "沛沛", "林襄", "李多慧", "Yuri", "菲菲", "群群", "佩霓", "靜靜", "金娜妍", "權喜原", "貝拉", "姵宸", "瑄瑄"] },
            "Rakuten Girls": { color: "var(--team-rg)", members: ["岱縈", "琳妲","孟潔", "卉妮", "若潼", "筠熹", "穎樂", "熊霓", "穆又甯", "宋宋", "禹菡", "貝佳頤", "言梓璇", "溫妮", "Kira", "崔荷潾", "Mika", "高橋佳帆", "笑笑", "彭彭", "廉世彬", "禹洙漢", "河智媛", "高佳彬", "金佳垠"] },
            "Wing Stars": { color: "var(--team-ws)", members: ["安芝儇", "朴旻曙", "螢螢", "圈圈", "恬魚", "昆昆", "李樂", "JC", "黃澄澄", "妡0", "艾琳", "一粒", "瑈瑈", "林浠", "筱雯", "毛毛", "芃芃", "玖玖", "米亞", "米妮", "尼莫", "千千", "ET", "會晴", "芋頭", "Nina"] }
        };
        const typeToRarity = { "普卡": "common", "亮面特卡": "rare", "平行閃卡": "epic", "實戰衣物卡": "relic", "專屬簽名卡": "legendary", "唇印簽名卡": "legendary", "1/1 寶石簽名卡": "mythic" };

        let collection = JSON.parse(localStorage.getItem('cheer_collection_v10')) || {};
        let totalPulls = parseInt(localStorage.getItem('cheer_total_pulls_v10')) || 0;
        let pullLog = JSON.parse(localStorage.getItem('cheer_pull_log_v10')) || [];
        let isGameOver = localStorage.getItem('cheer_gameover_v10') === 'true';
        
        const MAX_TICKETS = 10; const REGEN_MS = 60 * 1000; 
        let tickets = parseInt(localStorage.getItem('cheer_tickets_v10'));
        if (isNaN(tickets)) tickets = MAX_TICKETS;
        let lastUpdateTime = parseInt(localStorage.getItem('cheer_time_v10')) || Date.now();

        let cardQueue = []; 
        let albumTeam = "Passion Sisters"; let albumType = "普卡"; let albumPage = 1; const cardsPerPage = 9;

        // 計算遊戲內總共有多少張獨特卡片 (1155張)
        let totalUniquePossible = 0;
        Object.keys(db).forEach(t => totalUniquePossible += db[t].members.length * Object.keys(typeToRarity).length);

        function updateStamina() {
            if (isGameOver) return;
            const now = Date.now();
            if (tickets < MAX_TICKETS) {
                let diff = now - lastUpdateTime; let added = Math.floor(diff / REGEN_MS);
                if (added > 0) { tickets = Math.min(MAX_TICKETS, tickets + added); lastUpdateTime += added * REGEN_MS; saveStamina(); }
            } else { lastUpdateTime = now; }
            
            document.getElementById('ui-tickets').innerText = tickets;
            if (tickets < MAX_TICKETS) {
                let remain = REGEN_MS - (now - lastUpdateTime);
                let m = Math.floor(remain / 60000); let s = Math.floor((remain % 60000) / 1000);
                document.getElementById('ui-timer').innerText = `(回復: ${m}:${s.toString().padStart(2, '0')})`;
            } else { document.getElementById('ui-timer').innerText = `(已滿)`; }

            document.getElementById('btn-pack').disabled = (tickets < 1);
            document.getElementById('btn-team-pack').disabled = (tickets < 1);
            document.getElementById('btn-box').disabled = (tickets < 10);
        }
        setInterval(updateStamina, 1000);

        function saveStamina() { localStorage.setItem('cheer_tickets_v10', tickets); localStorage.setItem('cheer_time_v10', lastUpdateTime); }
        function consumeTickets(amount) { if (tickets >= MAX_TICKETS) lastUpdateTime = Date.now(); tickets -= amount; saveStamina(); updateStamina(); }

        function getRandomGirl(forceTeam = null) {
            const teams = Object.keys(db); const team = forceTeam ? forceTeam : teams[Math.floor(Math.random() * teams.length)];
            const members = db[team].members; return { team, name: members[Math.floor(Math.random() * members.length)], color: db[team].color };
        }

        function shuffle(array) { for (let i = array.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [array[i], array[j]] = [array[j], array[i]]; } }
        function generateCard(type, rarity, desc = "", forceTeam = null) {
            const girl = getRandomGirl(forceTeam); cardQueue.push({ team: girl.team, teamColor: girl.color, name: girl.name, type, rarity, desc });
        }

        function rollSpecialSlot(isTeamPack = false) {
            const rng = Math.random();
            if (isTeamPack) {
                if(rng < 0.001) return { type: "1/1 寶石簽名卡", rarity: "mythic", desc: "👑1/1 全球唯一" };
                if(rng < 0.015) return { type: Math.random() > 0.5 ? "專屬簽名卡" : "唇印簽名卡", rarity: "legendary", desc: "✍親筆" };
                if(rng < 0.050) return { type: "實戰衣物卡", rarity: "relic", desc: "👕衣物切片" };
                if(rng < 0.200) return { type: "平行閃卡", rarity: "epic", desc: "" };
                return { type: "亮面特卡", rarity: "rare", desc: "" };
            } else {
                if(rng < 0.005) return { type: "1/1 寶石簽名卡", rarity: "mythic", desc: "👑1/1 全球唯一" };
                if(rng < 0.050) return { type: Math.random() > 0.5 ? "專屬簽名卡" : "唇印簽名卡", rarity: "legendary", desc: "✍親筆" };
                if(rng < 0.150) return { type: "實戰衣物卡", rarity: "relic", desc: "👕衣物切片" };
                if(rng < 0.450) return { type: "平行閃卡", rarity: "epic", desc: "" };
                return { type: "亮面特卡", rarity: "rare", desc: "" };
            }
        }

        function startOpening(mode) {
            if (isGameOver) return alert("遊戲已完美破關！無法再抽取新卡包。");
            cardQueue = []; 
            if(mode === 'pack') {
                if (tickets < 1) return alert("抽卡券不足！"); consumeTickets(1);
                for(let i=0; i<4; i++) generateCard("普卡", "common");
                const sp = rollSpecialSlot(false); generateCard(sp.type, sp.rarity, sp.desc);
            } 
            else if(mode === 'team') {
                if (tickets < 1) return alert("抽卡券不足！"); consumeTickets(1);
                const targetTeam = document.getElementById('target-team-select').value;
                for(let i=0; i<4; i++) generateCard("普卡", "common", "", targetTeam);
                const sp = rollSpecialSlot(true); generateCard(sp.type, sp.rarity, sp.desc, targetTeam);
            }
            else if(mode === 'box') {
                if (tickets < 10) return alert("抽卡券不足 10 張！"); consumeTickets(10);
                for(let i=0; i<35; i++) generateCard("普卡", "common");
                for(let i=0; i<8; i++) generateCard("亮面特卡", "rare");
                for(let i=0; i<4; i++) generateCard("平行閃卡", "epic");
                generateCard("實戰衣物卡", "relic", "👕衣物切片"); generateCard("專屬簽名卡", "legendary", "✍簽名版"); generateCard("唇印簽名卡", "legendary", "💋唇印版");
                if(Math.random() < 0.02) { cardQueue.pop(); generateCard("1/1 寶石簽名卡", "mythic", "👑1/1 全球唯一"); }
            }
            shuffle(cardQueue); document.getElementById('status-text').innerText = ""; document.getElementById('btn-next').style.display = "block"; showNextCard();
        }

        function getCardHTML(data) {
            let nameColor = "#fff"; let signatureHtml = ""; let relicHtml = ""; let mythicBadge = "";
            if (data.rarity === 'relic') { nameColor = '#f39c12'; relicHtml = `<div class="relic-patch">Patch</div>`; }
            else if (data.rarity === 'legendary') {
                nameColor = 'var(--pink)';
                let signText = data.type === "唇印簽名卡" ? "<span class='lip-mark'>💋</span> " + data.name : "Sign. " + data.name;
                signatureHtml = `<div class="signature-overlay">${signText}</div>`;
            }
            else if (data.rarity === 'mythic') {
                nameColor = '#fff'; mythicBadge = `<div class="mythic-badge">1/1</div>`;
                signatureHtml = `<div class="signature-overlay" style="color:white; text-shadow: 0 0 10px var(--gold);">Sign. ${data.name}</div>`;
            }
            return `
                <div class="card rarity-${data.rarity}">
                    <div class="card-team" style="background-color: ${data.teamColor};">${data.team}</div>
                    ${mythicBadge}
                    <div class="card-image-wrapper">
                        <img src="images/${data.name}.jpg" alt="${data.name}" onerror="this.onerror=null; this.parentElement.innerHTML='<div class=\\'missing-img\\'>📸<br>缺少 ${data.name}.jpg<br>等待上傳</div>';">
                        ${relicHtml} ${signatureHtml}
                    </div>
                    <div class="card-type">${data.type}</div>
                    <div class="card-name" style="color: ${nameColor};">${data.name}</div>
                </div>
            `;
        }

        function showNextCard() {
            const container = document.getElementById('card-container');
            const status = document.getElementById('queue-status');
            const btn = document.getElementById('btn-next');
            
            if (cardQueue.length === 0) {
                container.innerHTML = ""; status.innerText = "卡包已見底！"; btn.style.display = "none";
                document.getElementById('status-text').innerText = "點擊按鈕，繼續尋找本命女孩！"; 
                checkGameCompletion(); // 檢查是否達到破關條件
                return;
            }
            
            const data = cardQueue.pop(); 
            totalPulls++; localStorage.setItem('cheer_total_pulls_v10', totalPulls);
            
            const key = `${data.team}_${data.type}_${data.name}`;
            if(collection[key]) collection[key].count++;
            else collection[key] = { ...data, count: 1 };
            localStorage.setItem('cheer_collection_v10', JSON.stringify(collection)); 

            if (['epic', 'relic', 'legendary', 'mythic'].includes(data.rarity)) {
                pullLog.unshift({ ...data, pullNumber: totalPulls });
                if (pullLog.length > 200) pullLog.pop();
                localStorage.setItem('cheer_pull_log_v10', JSON.stringify(pullLog));
            }

            status.innerText = `剩餘未翻開卡片：${cardQueue.length} 張`;
            container.innerHTML = getCardHTML(data);
            if (cardQueue.length === 0) btn.innerText = "完成 🎉";
            else btn.innerText = "翻開下一張！ ➡️";
        }

        // 終極判定：大滿貫破關檢查機制
        function checkGameCompletion() {
            let uniqueOwned = Object.keys(collection).length;
            if (uniqueOwned >= totalUniquePossible) {
                isGameOver = true;
                localStorage.setItem('cheer_gameover_v10', 'true');
                
                document.getElementById('display-area').innerHTML = `
                    <div style="background: linear-gradient(135deg, #111, #2b1b24); padding: 40px; border-radius: 20px; color: #fff; max-width: 650px; margin: 20px auto; box-shadow: 0 0 50px rgba(255, 126, 179, 0.6); border: 4px solid var(--pink);">
                        <h2 style="font-size: 34px; color: var(--gold); margin-bottom: 20px; text-shadow: 0 0 15px var(--gold);">👑 終極大滿貫・完美通關！ 🎉</h2>
                        <p style="font-size: 18px; line-height: 1.6;">不可思議！你已成功解鎖全台灣職棒 6 大球隊、所有卡片款式、共 <span style="color:var(--pink); font-weight:bold;">${totalUniquePossible}</span> 款啦啦隊女孩全圖鑑！</p>
                        <div style="background: rgba(255,255,255,0.05); padding: 20px; border-radius: 12px; margin: 25px 0; border: 1px solid rgba(255,255,255,0.1);">
                            <span style="font-size: 18px; color: #aaa;">完美圖鑑締造紀錄</span><br>
                            <span style="font-size: 20px;">生涯累計耗費：</span>
                            <span style="color:var(--gold); font-size:40px; font-weight:bold; text-shadow: 0 0 10px var(--gold);">${totalPulls}</span> 抽！
                        </div>
                        <p style="color: #bbb; font-size: 14px;">你可以隨時點擊「九宮格卡冊」進去欣賞你神話般的完美活頁本珍藏！</p>
                    </div>
                `;
                document.getElementById('btn-pack').disabled = true;
                document.getElementById('btn-box').disabled = true;
                document.getElementById('btn-team-pack').disabled = true;
                document.getElementById('ui-timer').innerText = `(GAME OVER)`;
            }
        }

        function toggleModal(modalId) {
            const modal = document.getElementById(modalId);
            if (modal.style.display === "block") { modal.style.display = "none"; } 
            else { modal.style.display = "block"; if(modalId === 'collection-modal') renderAlbumPage(); if(modalId === 'log-modal') renderLog(); }
        }

        function renderLog() {
            document.getElementById('total-pulls-display').innerText = totalPulls;
            const logList = document.getElementById('log-list'); logList.innerHTML = '';
            if(pullLog.length === 0) { logList.innerHTML = '<div style="text-align:center; color:#888; padding: 20px;">尚未抽出大獎...</div>'; return; }
            pullLog.forEach(log => {
                let nameColor = "#fff"; let rarityBorder = "#704762";
                if(log.rarity === 'mythic') { nameColor = "var(--gold)"; rarityBorder = "var(--gold)"; }
                else if(log.rarity === 'legendary') { nameColor = "var(--pink)"; rarityBorder = "var(--pink)"; }
                else if(log.rarity === 'relic') { nameColor = "#e67e22"; rarityBorder = "#e67e22"; }
                else if(log.rarity === 'epic') { nameColor = "#00f2fe"; rarityBorder = "#00f2fe"; }
                logList.innerHTML += `
                    <div class="log-item" style="border-color: ${rarityBorder};">
                        <div style="text-align:left;">
                            <div style="font-size:12px; color:#aaa; margin-bottom: 2px;"><span style="background:${log.teamColor}; color:white; padding:2px 6px; border-radius:4px;">${log.team}</span> ${log.type}</div>
                            <div style="font-size:22px; font-weight:bold; color:${nameColor};">${log.name}</div>
                        </div>
                        <div class="log-pull-num">第 <span style="color:var(--gold); font-size:18px;">${log.pullNumber}</span> 抽</div>
                    </div>
                `;
            });
        }

        function onAlbumFilterChange() { albumTeam = document.getElementById('filter-team').value; albumType = document.getElementById('filter-type').value; albumPage = 1; renderAlbumPage(); }
        function changeAlbumPage(direction) {
            const members = db[albumTeam].members; const totalPages = Math.ceil(members.length / cardsPerPage);
            let newPage = albumPage + direction; if (newPage >= 1 && newPage <= totalPages) { albumPage = newPage; renderAlbumPage(); }
        }

        // 活頁簿渲染：新增隊伍+系列 里程碑收集完成橫幅
        function renderAlbumPage() {
            const grid = document.getElementById('album-grid');
            const pageInfo = document.getElementById('album-page-info');
            const stats = document.getElementById('collection-stats');
            const bannerContainer = document.getElementById('album-complete-banner');
            grid.innerHTML = ''; bannerContainer.innerHTML = '';

            const members = db[albumTeam].members;
            const totalPages = Math.ceil(members.length / cardsPerPage) || 1;
            pageInfo.innerText = `${albumPage} / ${totalPages}`;

            let totalCardsOwned = 0; let uniqueCardsOwned = Object.keys(collection).length;
            Object.values(collection).forEach(c => totalCardsOwned += c.count);
            stats.innerText = `目前解鎖總圖鑑數：${uniqueCardsOwned} / ${totalUniquePossible} 款 | 總持有卡片：${totalCardsOwned} 張`;

            // 檢查該隊此系列是否全部集齊
            let isSeriesComplete = true;
            members.forEach(m => {
                if (!collection[`${albumTeam}_${albumType}_${m}`]) isSeriesComplete = false;
            });
            if (isSeriesComplete) {
                bannerContainer.innerHTML = `<div class="complete-banner">🏆 已完成蒐集！恭喜集齊【${albumTeam}】的【${albumType}】全系列！✨</div>`;
            }

            const startIndex = (albumPage - 1) * cardsPerPage;
            const pageMembers = members.slice(startIndex, startIndex + cardsPerPage);

            pageMembers.forEach(name => {
                const key = `${albumTeam}_${albumType}_${name}`; const hasCard = collection[key] && collection[key].count > 0;
                const cardData = { team: albumTeam, teamColor: db[albumTeam].color, name: name, type: albumType, rarity: typeToRarity[albumType] };
                
                const wrapper = document.createElement('div'); wrapper.className = 'album-item-wrapper'; wrapper.innerHTML = getCardHTML(cardData);
                const cardEl = wrapper.querySelector('.card');
                if (!hasCard) {
                    cardEl.classList.add('locked');
                    const lockOverlay = document.createElement('div'); lockOverlay.className = 'lock-overlay'; lockOverlay.innerText = '🔒 未解鎖';
                    wrapper.appendChild(lockOverlay);
                } else {
                    const badge = document.createElement('div'); badge.className = 'album-count-badge'; badge.innerText = `x${collection[key].count}`;
                    wrapper.appendChild(badge); wrapper.style.cursor = 'pointer'; wrapper.onclick = function() { viewCardInViewer(collection[key]); };
                }
                grid.appendChild(wrapper);
            });
        }

        function viewCardInViewer(cardData) {
            const viewerModal = document.getElementById('card-viewer-modal'); const viewerContent = document.getElementById('card-viewer-content');
            viewerContent.innerHTML = getCardHTML(cardData); viewerModal.style.display = "flex";
        }
        function closeCardViewer() { document.getElementById('card-viewer-modal').style.display = "none"; }

        function clearCollection() {
            if(confirm("確定要清空所有資料嗎？（所有進度、體力將全數重置）")) {
                collection = {}; totalPulls = 0; pullLog = []; tickets = MAX_TICKETS; lastUpdateTime = Date.now(); isGameOver = false;
                localStorage.clear(); saveStamina(); location.reload();
            }
        }
        
        // 初始載入與過關檢查
        updateStamina();
        if (isGameOver) { checkGameCompletion(); }
    </script>
</body>
</html>
